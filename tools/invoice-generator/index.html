  <!-- ══ SCRIPT ════════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    // ── CURRENCY MAP ──────────────────────────────────────────────────────
    var SYM = { USD:'$', EUR:'€', GBP:'£', AUD:'A$', CAD:'C$', LKR:'Rs.\u00a0', SGD:'S$', AED:'\u062f.\u0625\u00a0' };

    // ── DATE HELPERS ──────────────────────────────────────────────────────
    function today() {
      return new Date().toISOString().slice(0, 10);
    }
    function addDays(iso, n) {
      var d = new Date(iso); d.setDate(d.getDate() + n);
      return d.toISOString().slice(0, 10);
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      var p = iso.split('-');
      var mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return mo[+p[1] - 1] + ' ' + +p[2] + ', ' + p[0];
    }
    function autoInvoiceNum() {
      var d = new Date();
      return 'INV-' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + '-001';
    }

    // ── NUMBER FORMAT ─────────────────────────────────────────────────────
    function fmtMoney(n, sym) {
      return sym + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    // ── HTML ESCAPE ───────────────────────────────────────────────────────
    function esc(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── LINE ITEMS STATE ──────────────────────────────────────────────────
    var uid = 0;
    var items = [
      { id: ++uid, desc: 'Web Development Services', qty: 10, rate: 150 },
      { id: ++uid, desc: 'UI/UX Design', qty: 5, rate: 120 }
    ];

    // ── DOM SHORTCUTS ─────────────────────────────────────────────────────
    function g(id) { return document.getElementById(id); }

    var fNum         = g('f-num');
    var fCurrency    = g('f-currency');
    var fDate        = g('f-date');
    var fDue         = g('f-due');
    var fIssName     = g('f-iss-name');
    var fIssEmail    = g('f-iss-email');
    var fIssAddr     = g('f-iss-addr');
    var fIssWeb      = g('f-iss-web');
    var fCliName     = g('f-cli-name');
    var fCliContact  = g('f-cli-contact');
    var fCliEmail    = g('f-cli-email');
    var fCliAddr     = g('f-cli-addr');
    var fTaxLabel    = g('f-tax-label');
    var fTaxRate     = g('f-tax-rate');
    var fDiscount    = g('f-discount');
    var fBankName    = g('f-bank-name');
    var fBankAcctNm  = g('f-bank-acct-name');
    var fBankAcctNum = g('f-bank-acct-num');
    var fBankSwift   = g('f-bank-swift');
    var fBankIban    = g('f-bank-iban');
    var fNotes       = g('f-notes');
    var itemsForm    = g('items-form');
    var sheet        = g('invoice-sheet');
    var outer        = g('invoice-outer');
    var previewPane  = g('preview-pane');

    // ── INIT FIELD VALUES ─────────────────────────────────────────────────
    var t = today();
    fNum.value      = autoInvoiceNum();
    fDate.value     = t;
    fDue.value      = addDays(t, 30);
    fIssName.value  = 'NexusDigitalLabs \u2014 Software Studio';
    fIssEmail.value = 'hello@nexusdigitallabs.dev';
    fIssWeb.value   = 'nexusdigitallabs.dev';
    fTaxLabel.value = 'Tax';
    fNotes.value    = 'Payment due within 30 days. Thank you for your business.';

    // ── TOTALS ────────────────────────────────────────────────────────────
    function calcTotals() {
      var sub = items.reduce(function(s,i){ return s + (+i.qty||0) * (+i.rate||0); }, 0);
      var discPct = +fDiscount.value || 0;
      var taxPct  = +fTaxRate.value  || 0;
      var discAmt = sub * (discPct / 100);
      var taxAmt  = (sub - discAmt) * (taxPct / 100);
      return { sub: sub, discAmt: discAmt, taxAmt: taxAmt, total: sub - discAmt + taxAmt };
    }

    // ── LINE ITEMS FORM ───────────────────────────────────────────────────
    function renderItemsForm() {
      itemsForm.innerHTML = '';
      items.forEach(function(item) {
        var wrap = document.createElement('div');
        wrap.style.cssText = 'background:rgba(15,23,42,0.6);border:1px solid #1a2744;border-radius:9px;padding:11px;';
        wrap.setAttribute('data-id', item.id);
        wrap.innerHTML =
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
            '<span style="font-size:10px;font-weight:500;color:#3b5268;text-transform:uppercase;letter-spacing:0.06em;">Item</span>' +
            '<button type="button" class="remove-btn focus-ring" data-id="'+item.id+'" style="color:#2d4a60;background:none;border:none;cursor:pointer;padding:0;transition:color 0.15s;" onmouseover="this.style.color=\'#f87171\'" onmouseout="this.style.color=\'#2d4a60\'">' +
              '<svg style="width:13px;height:13px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>' +
            '</button>' +
          '</div>' +
          '<input type="text" class="fi focus-ring item-desc" data-id="'+item.id+'" placeholder="Service or product description" value="'+esc(item.desc)+'" style="margin-bottom:8px;" />' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
            '<div><label class="fi-label">Qty / Hrs</label><input type="number" min="0" step="0.5" class="fi focus-ring item-qty" data-id="'+item.id+'" value="'+item.qty+'" /></div>' +
            '<div><label class="fi-label">Rate</label><input type="number" min="0" step="0.01" class="fi focus-ring item-rate" data-id="'+item.id+'" value="'+item.rate+'" /></div>' +
          '</div>';
        itemsForm.appendChild(wrap);
      });
    }

    // ── INVOICE SHEET RENDER ──────────────────────────────────────────────
    function renderSheet() {
      var sym     = SYM[fCurrency.value] || '$';
      var totals  = calcTotals();
      var taxPct  = +fTaxRate.value  || 0;
      var discPct = +fDiscount.value || 0;
      var taxLbl  = fTaxLabel.value.trim() || 'Tax';

      var issName  = fIssName.value.trim();
      var issEmail = fIssEmail.value.trim();
      var issAddr  = fIssAddr.value.trim();
      var issWeb   = fIssWeb.value.trim();
      var cliName  = fCliName.value.trim()    || 'Client';
      var cliCont  = fCliContact.value.trim();
      var cliEmail = fCliEmail.value.trim();
      var cliAddr  = fCliAddr.value.trim();
      var bkName   = fBankName.value.trim();
      var bkAccNm  = fBankAcctNm.value.trim();
      var bkAccNum = fBankAcctNum.value.trim();
      var bkSwift  = fBankSwift.value.trim();
      var bkIban   = fBankIban.value.trim();
      var notes    = fNotes.value.trim();

      // Line item rows
      var rows = items.map(function(item) {
        var q = +item.qty||0, r = +item.rate||0;
        return '<tr class="line-item-row">' +
          '<td style="font-size:12px;color:#1f2937;padding:10px 10px;border-bottom:1px solid #f3f4f6;">'+esc(item.desc||'—')+'</td>' +
          '<td class="r" style="font-size:12px;color:#374151;padding:10px 10px;border-bottom:1px solid #f3f4f6;">'+q+'</td>' +
          '<td class="r" style="font-size:12px;color:#374151;padding:10px 10px;border-bottom:1px solid #f3f4f6;">'+fmtMoney(r,sym)+'</td>' +
          '<td class="r" style="font-size:12px;font-weight:500;color:#111827;padding:10px 10px;border-bottom:1px solid #f3f4f6;">'+fmtMoney(q*r,sym)+'</td>' +
        '</tr>';
      }).join('');

      // Totals block
      var totalsHtml =
        '<tr><td colspan="3" style="font-size:11.5px;color:#6b7280;padding:7px 10px;text-align:right;">Subtotal</td>' +
        '<td style="font-size:11.5px;color:#374151;padding:7px 10px;text-align:right;min-width:110px;">'+fmtMoney(totals.sub,sym)+'</td></tr>';
      if (discPct > 0) {
        totalsHtml += '<tr><td colspan="3" style="font-size:11px;color:#9ca3af;padding:5px 10px;text-align:right;">Discount ('+discPct+'%)</td>' +
          '<td style="font-size:11px;color:#ef4444;padding:5px 10px;text-align:right;">\u2212'+fmtMoney(totals.discAmt,sym)+'</td></tr>';
      }
      if (taxPct > 0) {
        totalsHtml += '<tr><td colspan="3" style="font-size:11px;color:#9ca3af;padding:5px 10px;text-align:right;">'+esc(taxLbl)+' ('+taxPct+'%)</td>' +
          '<td style="font-size:11px;color:#374151;padding:5px 10px;text-align:right;">'+fmtMoney(totals.taxAmt,sym)+'</td></tr>';
      }
      totalsHtml += '<tr class="inv-total-row">' +
        '<td colspan="3" style="font-size:13.5px;font-weight:700;color:#111827;padding:11px 10px;text-align:right;border-top:2px solid #111827;">Total Due</td>' +
        '<td style="font-size:13.5px;font-weight:700;color:#111827;padding:11px 10px;text-align:right;border-top:2px solid #111827;">'+fmtMoney(totals.total,sym)+'</td></tr>';

      // Bank section
      var bankHtml = '';
      if (bkName || bkAccNum || bkSwift) {
        var bkCells = '';
        if (bkName)   bkCells += cell('Bank', bkName, false);
        if (bkAccNm)  bkCells += cell('Account Name', bkAccNm, false);
        if (bkAccNum) bkCells += cell('Account Number', bkAccNum, true);
        if (bkSwift)  bkCells += cell('SWIFT / BIC', bkSwift, true);
        if (bkIban)   bkCells += '<div style="grid-column:span 2;">'+cellInner('IBAN', bkIban, true)+'</div>';
        bankHtml =
          '<div style="margin-top:24px;padding:14px 16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:7px;page-break-inside:avoid;">' +
            '<p class="inv-section-label">Bank Transfer Details</p>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;">'+bkCells+'</div>' +
          '</div>';
      }

      var notesHtml = '';
      if (notes) {
        notesHtml =
          '<div style="margin-top:20px;page-break-inside:avoid;">' +
            '<p class="inv-section-label">Notes</p>' +
            '<p style="font-size:11px;color:#6b7280;line-height:1.7;white-space:pre-line;">'+esc(notes)+'</p>' +
          '</div>';
      }

      sheet.innerHTML =
        // ── Header
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;">' +
          '<div>' +
            '<div style="width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#6366f1);display:flex;align-items:center;justify-content:center;margin-bottom:12px;">' +
              '<span style="font-size:15px;font-weight:700;color:#fff;font-family:Inter,sans-serif;">N</span>' +
            '</div>' +
            '<p style="font-size:15px;font-weight:600;color:#111827;margin:0 0 3px;">'+esc(issName||'Issuer')+'</p>' +
            (issEmail ? '<p style="font-size:11px;color:#6b7280;margin:0 0 2px;">'+esc(issEmail)+'</p>' : '') +
            (issAddr  ? '<p style="font-size:11px;color:#6b7280;margin:0 0 2px;white-space:pre-line;">'+esc(issAddr)+'</p>' : '') +
            (issWeb   ? '<p style="font-size:11px;color:#2563eb;margin:0;">'+esc(issWeb)+'</p>' : '') +
          '</div>' +
          '<div style="text-align:right;">' +
            '<p style="font-size:30px;font-weight:200;color:#111827;letter-spacing:-0.03em;margin:0 0 10px;font-family:Inter,sans-serif;">INVOICE</p>' +
            '<p style="font-size:13px;font-weight:700;color:#111827;margin:0 0 5px;">'+esc(fNum.value||'INV-001')+'</p>' +
            '<p style="font-size:11px;color:#6b7280;margin:0 0 2px;">Date&ensp;'+fmtDate(fDate.value)+'</p>' +
            '<p style="font-size:11px;color:#6b7280;margin:0 0 6px;">Due&ensp;&ensp;'+fmtDate(fDue.value)+'</p>' +
            '<span style="font-size:10px;font-weight:600;color:#374151;background:#f3f4f6;padding:3px 8px;border-radius:4px;">'+fCurrency.value+'</span>' +
          '</div>' +
        '</div>' +

        // ── Divider
        '<div style="height:1px;background:#e5e7eb;margin-bottom:26px;"></div>' +

        // ── Bill To
        '<div style="margin-bottom:28px;">' +
          '<p class="inv-section-label">Bill To</p>' +
          '<p style="font-size:14px;font-weight:600;color:#111827;margin:0 0 3px;">'+esc(cliName)+'</p>' +
          (cliCont  ? '<p style="font-size:11px;color:#374151;margin:0 0 2px;">'+esc(cliCont)+'</p>' : '') +
          (cliEmail ? '<p style="font-size:11px;color:#6b7280;margin:0 0 2px;">'+esc(cliEmail)+'</p>' : '') +
          (cliAddr  ? '<p style="font-size:11px;color:#6b7280;margin:0;white-space:pre-line;">'+esc(cliAddr)+'</p>' : '') +
        '</div>' +

        // ── Line items table
        '<table class="inv-table">' +
          '<thead><tr>' +
            '<th style="width:55%;">Description</th>' +
            '<th class="r" style="width:12%;">Qty</th>' +
            '<th class="r" style="width:16%;">Rate</th>' +
            '<th class="r" style="width:17%;">Amount</th>' +
          '</tr></thead>' +
          '<tbody>'+rows+'</tbody>' +
        '</table>' +

        // ── Totals
        '<div style="border-top:1px solid #e5e7eb;padding-top:4px;">' +
          '<table style="width:100%;border-collapse:collapse;">'+totalsHtml+'</table>' +
        '</div>' +

        // ── Bank + Notes
        bankHtml +
        notesHtml +

        // ── Footer
        '<div style="margin-top:44px;padding-top:14px;border-top:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;">' +
          '<p style="font-size:9.5px;color:#d1d5db;margin:0;">'+esc(issName)+'</p>' +
          '<p style="font-size:9.5px;color:#d1d5db;margin:0;">'+esc(fNum.value||'INV')+'</p>' +
        '</div>';

      scaleSheet();
    }

    function cell(label, val, mono) {
      return '<div>'+cellInner(label, val, mono)+'</div>';
    }
    function cellInner(label, val, mono) {
      return '<p style="font-size:8.5px;color:#9ca3af;margin:0 0 3px;text-transform:uppercase;letter-spacing:0.07em;font-weight:600;">'+esc(label)+'</p>' +
             '<p style="font-size:12px;color:#111827;margin:0;'+(mono?'font-family:monospace;':'')+'">'+esc(val)+'</p>';
    }

    // ── SCALE SHEET TO FIT PREVIEW PANE ──────────────────────────────────
    function scaleSheet() {
      // Reset to measure natural dimensions
      sheet.style.transform = '';
      outer.style.width  = '';
      outer.style.height = '';

      var paneW = previewPane.clientWidth - 48; // 24px padding each side
      var natW  = 794;
      var natH  = sheet.offsetHeight;
      var scale = Math.min(1, paneW / natW);

      sheet.style.transform       = 'scale(' + scale + ')';
      sheet.style.transformOrigin = 'top left';
      outer.style.width  = Math.round(natW * scale) + 'px';
      outer.style.height = Math.round(natH * scale) + 'px';
    }

    // ── RESIZE OBSERVER ───────────────────────────────────────────────────
    var ro = new ResizeObserver(function() { scaleSheet(); });
    ro.observe(previewPane);

    // ── GLOBAL FORM INPUT LISTENERS ───────────────────────────────────────
    var globalInputs = [
      fNum, fCurrency, fDate, fDue,
      fIssName, fIssEmail, fIssAddr, fIssWeb,
      fCliName, fCliContact, fCliEmail, fCliAddr,
      fTaxLabel, fTaxRate, fDiscount,
      fBankName, fBankAcctNm, fBankAcctNum, fBankSwift, fBankIban,
      fNotes
    ];
    globalInputs.forEach(function(el) {
      el.addEventListener('input',  renderSheet);
      el.addEventListener('change', renderSheet);
    });

    // ── LINE ITEMS — event delegation ────────────────────────────────────
    itemsForm.addEventListener('input', function(e) {
      var id = +e.target.getAttribute('data-id');
      if (!id) return;
      var item = items.find(function(i){ return i.id === id; });
      if (!item) return;
      if (e.target.classList.contains('item-desc')) item.desc = e.target.value;
      if (e.target.classList.contains('item-qty'))  item.qty  = +e.target.value || 0;
      if (e.target.classList.contains('item-rate')) item.rate = +e.target.value || 0;
      renderSheet();
    });

    itemsForm.addEventListener('click', function(e) {
      var btn = e.target.closest('.remove-btn');
      if (!btn) return;
      var id = +btn.getAttribute('data-id');
      items = items.filter(function(i){ return i.id !== id; });
      renderItemsForm();
      renderSheet();
    });

    g('btn-add-item').addEventListener('click', function() {
      items.push({ id: ++uid, desc: '', qty: 1, rate: 0 });
      renderItemsForm();
      renderSheet();
      // Scroll to bottom of items form
      itemsForm.lastElementChild && itemsForm.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // ── DOWNLOAD PDF ──────────────────────────────────────────────────────
    g('btn-download').addEventListener('click', function() {
      var btn = this;
      var origHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML =
        '<svg style="width:15px;height:15px;animation:spin 0.9s linear infinite;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>' +
        '\u00a0Generating\u2026';

      // Temporarily reset scale for clean PDF capture
      var savedTransform = sheet.style.transform;
      sheet.style.transform = '';
      outer.style.width  = '794px';
      outer.style.height = sheet.offsetHeight + 'px';

      var filename = 'invoice-' + (fNum.value||'NDL').replace(/[^a-zA-Z0-9\-]/g, '-').toLowerCase() + '.pdf';

      var element = document.getElementById('invoice-sheet');
      var options = {
        margin:      [15, 12, 15, 12],
        filename:    filename,
        image:       { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(options).from(element).save().then(function() {
        // Restore scale
        sheet.style.transform = savedTransform;
        scaleSheet();
        btn.disabled = false;
        btn.innerHTML = origHTML;
      });
    });

    // Spin keyframe for button loading state
    var styleEl = document.createElement('style');
    styleEl.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
    document.head.appendChild(styleEl);

    // ── INITIAL RENDER ────────────────────────────────────────────────────
    renderItemsForm();
    renderSheet();

  }());
  </script>

</body>
</html>
