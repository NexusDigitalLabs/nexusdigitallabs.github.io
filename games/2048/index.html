<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 — NexusDigitalLabs Games</title>
  <meta name="description" content="Play 2048 in your browser. Merge tiles to reach 2048. No login, no ads, fully client-side." />
  <link rel="canonical" href="https://nexusdigitallabs.dev/games/2048/" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F9FAFB; color: #0f172a; }

    /* ── Grid ─────────────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      background: #d1d5db;
      padding: 6px;
      width: min(360px, calc(100vw - 2.5rem));
      aspect-ratio: 1;
      user-select: none;
      touch-action: none;
    }

    /* ── Tiles ────────────────────────────────────────────────────── */
    .tile {
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      font-size: clamp(0.875rem, 5vw, 1.4rem);
      transition: background-color 0.08s, color 0.08s;
      aspect-ratio: 1;
    }
    .tile-new  { animation: tileAppear 0.12s ease-out; }
    .tile-pop  { animation: tilePop 0.14s ease-out; }

    @keyframes tileAppear {
      from { transform: scale(0.4); opacity: 0.5; }
      to   { transform: scale(1);   opacity: 1;   }
    }
    @keyframes tilePop {
      0%   { transform: scale(1);    }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1);    }
    }

    /* ── Score chip ───────────────────────────────────────────────── */
    .score-chip {
      border: 1px solid #e2e8f0; background: #fff;
      padding: 0.5rem 1rem; text-align: center; min-width: 90px;
    }
    .score-chip-label { font-size: 0.5625rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94a3b8; }
    .score-chip-val   { font-size: 1.25rem; font-weight: 800; color: #0f172a; line-height: 1.2; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn-action {
      border: 1px solid #e2e8f0; background: #fff; padding: 0.5rem 1rem;
      font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
    }
    .btn-action:hover { background: #f8fafc; }

    /* ── Overlay ──────────────────────────────────────────────────── */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; z-index: 10; pointer-events: none;
    }
    #overlay.active { pointer-events: auto; }
    #overlay-card {
      background: rgba(255,255,255,0.95); border: 1px solid #e2e8f0;
      padding: 2rem; text-align: center; min-width: 200px;
    }
    #overlay-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    #overlay-sub   { font-size: 0.875rem; color: #64748b; font-weight: 300; margin-bottom: 1.25rem; }
    #overlay-btn {
      background: #0f172a; color: #fff; border: none;
      padding: 0.625rem 1.5rem;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }
    #overlay-btn:hover { background: #1e293b; }

    /* ── Controls hint ────────────────────────────────────────────── */
    .hint-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .hint-key {
      border: 1px solid #e2e8f0; background: #fff;
      padding: 0.2rem 0.5rem; font-size: 0.6875rem; font-weight: 600;
      color: #64748b; font-family: 'Inter', monospace;
    }
    .slbl { font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94a3b8; }
  </style>
</head>
<body>

  <div id="site-nav"></div>
  <script src="/components/nav.js"></script>
  <script src="/components/game-state.js"></script>

  <!-- Page header -->
  <div style="border-bottom:1px solid #e2e8f0; background:#fff;">
    <div class="max-w-lg mx-auto px-6 py-5">
      <div class="flex items-center justify-between">
        <div>
          <a href="/games/" class="slbl hover:text-slate-600 transition-colors" style="text-decoration:none;">← Games</a>
          <h1 class="text-xl font-bold text-slate-900 mt-1">2048</h1>
        </div>
        <div class="flex gap-2">
          <div class="score-chip">
            <div class="score-chip-label">Score</div>
            <div class="score-chip-val" id="disp-score">0</div>
          </div>
          <div class="score-chip">
            <div class="score-chip-label">Best</div>
            <div class="score-chip-val" id="disp-best">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div class="max-w-lg mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-4">
      <p class="text-sm text-slate-400 font-light">Merge tiles to reach <strong class="font-semibold text-slate-600">2048</strong></p>
      <button class="btn-action" onclick="newGame()">New Game</button>
    </div>

    <!-- Grid wrapper (for overlay positioning) -->
    <div style="position:relative; display:inline-block; width:min(360px, calc(100vw - 2.5rem));">
      <div id="grid"></div>
      <div id="overlay">
        <div id="overlay-card" style="display:none;">
          <div id="overlay-title"></div>
          <div id="overlay-sub"></div>
          <button id="overlay-btn" onclick="newGame()">Play Again</button>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="mt-6 space-y-2">
      <p class="slbl text-center">Controls</p>
      <div class="hint-row mt-2">
        <div class="flex flex-col items-center gap-1">
          <span class="hint-key">↑ W</span>
          <span class="text-xs text-slate-400">Up</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="hint-key">↓ S</span>
          <span class="text-xs text-slate-400">Down</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="hint-key">← A</span>
          <span class="text-xs text-slate-400">Left</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="hint-key">→ D</span>
          <span class="text-xs text-slate-400">Right</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="hint-key">Swipe</span>
          <span class="text-xs text-slate-400">Touch</span>
        </div>
      </div>
    </div>
  </div>

  <script>
  /* ═══════════════════════════════════════════════════════════════════
   * TILE COLOURS — sharp, minimalist palette
   * ═══════════════════════════════════════════════════════════════════ */
  var TILE_STYLE = {
    0:    { bg: '#e9ecef',  fg: 'transparent',  size: '0'      },
    2:    { bg: '#ffffff',  fg: '#0f172a',       size: '1.25rem' },
    4:    { bg: '#f8fafc',  fg: '#0f172a',       size: '1.25rem' },
    8:    { bg: '#0f172a',  fg: '#ffffff',       size: '1.25rem' },
    16:   { bg: '#1e293b',  fg: '#ffffff',       size: '1.125rem' },
    32:   { bg: '#334155',  fg: '#ffffff',       size: '1.125rem' },
    64:   { bg: '#475569',  fg: '#ffffff',       size: '1.125rem' },
    128:  { bg: '#2563eb',  fg: '#ffffff',       size: '1rem'   },
    256:  { bg: '#1d4ed8',  fg: '#ffffff',       size: '1rem'   },
    512:  { bg: '#1e40af',  fg: '#ffffff',       size: '1rem'   },
    1024: { bg: '#312e81',  fg: '#ffffff',       size: '0.875rem' },
    2048: { bg: '#4ade80',  fg: '#052e16',       size: '0.875rem' },
  };
  function tileStyle(v) {
    return TILE_STYLE[v] || { bg: '#4ade80', fg: '#052e16', size: '0.75rem' };
  }

  /* ═══════════════════════════════════════════════════════════════════
   * STATE
   * ═══════════════════════════════════════════════════════════════════ */
  var board    = Array(16).fill(0);
  var score    = 0;
  var best     = 0;
  var gameOver = false;
  var won      = false;
  var animCells = {}; // cellIndex → 'new' | 'pop'

  /* ═══════════════════════════════════════════════════════════════════
   * BOARD ACCESSORS
   * ═══════════════════════════════════════════════════════════════════ */
  function idx(r, c) { return r * 4 + c; }

  function getRow(r) {
    return [board[idx(r,0)], board[idx(r,1)], board[idx(r,2)], board[idx(r,3)]];
  }
  function setRow(r, line) {
    for (var c = 0; c < 4; c++) board[idx(r,c)] = line[c];
  }
  function getCol(c) {
    return [board[idx(0,c)], board[idx(1,c)], board[idx(2,c)], board[idx(3,c)]];
  }
  function setCol(c, line) {
    for (var r = 0; r < 4; r++) board[idx(r,c)] = line[r];
  }

  /* ═══════════════════════════════════════════════════════════════════
   * CORE SHIFT ALGORITHM
   * Left-compress → merge pairs → left-compress → pad zeros
   * ═══════════════════════════════════════════════════════════════════ */
  function shiftLine(line) {
    var filtered = line.filter(function(n) { return n !== 0; });
    var result   = [];
    var i = 0;
    while (i < filtered.length) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        var merged = filtered[i] * 2;
        result.push(merged);
        score += merged;
        if (merged === 2048) won = true;
        i += 2;
      } else {
        result.push(filtered[i]);
        i++;
      }
    }
    while (result.length < 4) result.push(0);
    return result;
  }

  /* ═══════════════════════════════════════════════════════════════════
   * MOVES — each direction rotates to "left-shift then rotate back"
   * ═══════════════════════════════════════════════════════════════════ */
  function applyMove(direction) {
    var moved = false;
    animCells = {};

    if (direction === 'left' || direction === 'right') {
      for (var r = 0; r < 4; r++) {
        var orig = getRow(r);
        var line = direction === 'right' ? orig.slice().reverse() : orig.slice();
        var shifted = shiftLine(line);
        if (direction === 'right') shifted.reverse();
        if (orig.join(',') !== shifted.join(',')) { setRow(r, shifted); moved = true; }
      }
    } else {
      for (var c = 0; c < 4; c++) {
        var orig = getCol(c);
        var line = direction === 'down' ? orig.slice().reverse() : orig.slice();
        var shifted = shiftLine(line);
        if (direction === 'down') shifted.reverse();
        if (orig.join(',') !== shifted.join(',')) { setCol(c, shifted); moved = true; }
      }
    }

    return moved;
  }

  /* ═══════════════════════════════════════════════════════════════════
   * SPAWN & DETECTION
   * ═══════════════════════════════════════════════════════════════════ */
  function spawnTile() {
    var empties = [];
    for (var i = 0; i < 16; i++) { if (board[i] === 0) empties.push(i); }
    if (!empties.length) return;
    var pos = empties[Math.floor(Math.random() * empties.length)];
    board[pos] = Math.random() < 0.9 ? 2 : 4;
    animCells[pos] = 'new';
  }

  function isGameOver() {
    if (board.some(function(n) { return n === 0; })) return false;
    for (var r = 0; r < 4; r++) {
      for (var c = 0; c < 4; c++) {
        var v = board[idx(r, c)];
        if (c < 3 && board[idx(r, c+1)] === v) return false;
        if (r < 3 && board[idx(r+1, c)] === v) return false;
      }
    }
    return true;
  }

  /* ═══════════════════════════════════════════════════════════════════
   * RENDER
   * ═══════════════════════════════════════════════════════════════════ */
  function render() {
    var grid = document.getElementById('grid');
    var html = '';
    for (var i = 0; i < 16; i++) {
      var v  = board[i];
      var st = tileStyle(v);
      var animClass = animCells[i] === 'new' ? ' tile-new' : (animCells[i] === 'pop' ? ' tile-pop' : '');
      html += '<div class="tile' + animClass + '" style="background:' + st.bg + ';color:' + st.fg + ';font-size:' + st.size + ';">'
        + (v > 0 ? v.toLocaleString('en-US') : '')
        + '</div>';
    }
    grid.innerHTML = html;

    document.getElementById('disp-score').textContent = score.toLocaleString('en-US');
    document.getElementById('disp-best').textContent  = best.toLocaleString('en-US');
  }

  function showOverlay(title, sub, titleColor) {
    var card = document.getElementById('overlay-card');
    var ov   = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent  = title;
    document.getElementById('overlay-title').style.color  = titleColor || '#0f172a';
    document.getElementById('overlay-sub').textContent    = sub;
    card.style.display = 'block';
    ov.classList.add('active');
  }

  function hideOverlay() {
    document.getElementById('overlay-card').style.display = 'none';
    document.getElementById('overlay').classList.remove('active');
  }

  /* ═══════════════════════════════════════════════════════════════════
   * GAME FLOW
   * ═══════════════════════════════════════════════════════════════════ */
  function move(direction) {
    if (gameOver) return;
    var moved = applyMove(direction);
    if (!moved) return;

    if (score > best) {
      best = score;
      NDLGameState.saveScore('2048', best);
    }

    spawnTile();
    render();

    if (won) {
      showOverlay('You reached 2048!', 'Score: ' + score.toLocaleString('en-US') + '  —  Keep going or start fresh.', '#16a34a');
      won = false; // allow continuing
    } else if (isGameOver()) {
      gameOver = true;
      showOverlay('Game Over', 'Final score: ' + score.toLocaleString('en-US'), '#ef4444');
    }
  }

  function newGame() {
    board    = Array(16).fill(0);
    score    = 0;
    gameOver = false;
    won      = false;
    animCells = {};
    hideOverlay();
    spawnTile();
    spawnTile();
    render();
  }

  /* ═══════════════════════════════════════════════════════════════════
   * INPUT — keyboard
   * ═══════════════════════════════════════════════════════════════════ */
  document.addEventListener('keydown', function(e) {
    var map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
                w:'up', s:'down', a:'left', d:'right',
                W:'up', S:'down', A:'left', D:'right' };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  /* ── Touch / swipe ─────────────────────────────────────────────── */
  var touchX0, touchY0;
  var gridEl = document.getElementById('grid');

  document.addEventListener('touchstart', function(e) {
    touchX0 = e.touches[0].clientX;
    touchY0 = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (touchX0 == null) return;
    var dx = e.changedTouches[0].clientX - touchX0;
    var dy = e.changedTouches[0].clientY - touchY0;
    var threshold = 28;
    if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
    touchX0 = touchY0 = null;
  }, { passive: true });

  /* ═══════════════════════════════════════════════════════════════════
   * INIT
   * ═══════════════════════════════════════════════════════════════════ */
  document.addEventListener('DOMContentLoaded', function() {
    NDLGameState.requireUsername(function(name) {
      best = NDLGameState.getHighScore('2048');
      newGame();
    });
  });
  </script>
</body>
</html>
