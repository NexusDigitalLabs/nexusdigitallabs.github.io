<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake — NexusDigitalLabs Games</title>
  <meta name="description" content="Play Snake in your browser. Navigate to eat food, grow your snake. Avoid walls and your tail. Fully client-side." />
  <link rel="canonical" href="https://nexusdigitallabs.dev/games/snake/" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F9FAFB; color: #0f172a; }

    #canvas-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }
    #game-canvas {
      display: block;
      border: 1px solid #e2e8f0;
      background: #fff;
    }
    #canvas-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(255,255,255,0.94);
      z-index: 5;
    }
    #canvas-overlay.hidden { display: none; }

    .score-chip {
      border: 1px solid #e2e8f0; background: #fff;
      padding: 0.5rem 1rem; text-align: center; min-width: 90px;
    }
    .score-chip-label { font-size: 0.5625rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94a3b8; }
    .score-chip-val   { font-size: 1.25rem; font-weight: 800; color: #0f172a; line-height: 1.2; }

    .btn-action {
      border: none; background: #0f172a; color: #fff;
      padding: 0.625rem 1.75rem;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
    }
    .btn-action:hover { background: #1e293b; }

    .btn-secondary {
      border: 1px solid #e2e8f0; background: #fff;
      padding: 0.5rem 1rem;
      font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
    }
    .btn-secondary:hover { background: #f8fafc; }

    .hint-key {
      border: 1px solid #e2e8f0; background: #fff;
      padding: 0.2rem 0.5rem; font-size: 0.6875rem; font-weight: 600; color: #64748b;
    }
    .slbl { font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94a3b8; }

    /* D-pad touch controls */
    #dpad {
      display: none;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 4px;
    }
    @media (pointer: coarse) { #dpad { display: grid; } }
    .dpad-btn {
      background: #fff; border: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent; transition: background 0.1s;
    }
    .dpad-btn:active { background: #f1f5f9; }
    .dpad-empty { visibility: hidden; }
  </style>
</head>
<body>

  <div id="site-nav"></div>
  <script src="/components/nav.js"></script>
  <script src="/components/game-state.js"></script>

  <!-- Page header -->
  <div style="border-bottom:1px solid #e2e8f0; background:#fff;">
    <div class="max-w-lg mx-auto px-6 py-5">
      <div class="flex items-center justify-between">
        <div>
          <a href="/games/" class="slbl hover:text-slate-600 transition-colors" style="text-decoration:none;">← Games</a>
          <h1 class="text-xl font-bold text-slate-900 mt-1">Snake</h1>
        </div>
        <div class="flex gap-2">
          <div class="score-chip">
            <div class="score-chip-label">Score</div>
            <div class="score-chip-val" id="disp-score">0</div>
          </div>
          <div class="score-chip">
            <div class="score-chip-label">Best</div>
            <div class="score-chip-val" id="disp-best">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Game area -->
  <div class="max-w-lg mx-auto px-6 py-8 flex flex-col items-center gap-6">

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="canvas-overlay">
        <p id="ov-title" class="text-xl font-bold text-slate-900 mb-1">Snake</p>
        <p id="ov-sub"   class="text-sm text-slate-400 font-light mb-6">Arrow keys, WASD, or D-pad to move</p>
        <button class="btn-action" onclick="startGame()">Start Game</button>
      </div>
    </div>

    <!-- D-pad for touch devices -->
    <div id="dpad">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" ontouchstart="dpadPress('up')"   onmousedown="dpadPress('up')">↑</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" ontouchstart="dpadPress('left')" onmousedown="dpadPress('left')">←</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" ontouchstart="dpadPress('right')" onmousedown="dpadPress('right')">→</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" ontouchstart="dpadPress('down')" onmousedown="dpadPress('down')">↓</button>
      <div class="dpad-empty"></div>
    </div>

    <!-- Keyboard hints (hidden on touch) -->
    <div class="hidden sm:flex gap-3 items-center flex-wrap justify-center">
      <span class="slbl">Controls:</span>
      <span class="hint-key">↑ ↓ ← →</span>
      <span class="text-xs text-slate-400">or</span>
      <span class="hint-key">W A S D</span>
    </div>

    <button class="btn-secondary" onclick="startGame()">New Game</button>
  </div>

  <script>
  /* ═══════════════════════════════════════════════════════════════════
   * CANVAS SETUP — responsive, snapped to CELL grid
   * ═══════════════════════════════════════════════════════════════════ */
  var CELL = 20;
  var canvas = document.getElementById('game-canvas');
  var ctx    = canvas.getContext('2d');

  (function sizeCanvas() {
    var avail = Math.min(360, window.innerWidth - 48);
    var size  = Math.floor(avail / CELL) * CELL;
    canvas.width  = size;
    canvas.height = size;
    canvas.style.width  = size + 'px';
    canvas.style.height = size + 'px';
  })();

  var COLS = canvas.width  / CELL;
  var ROWS = canvas.height / CELL;

  /* ═══════════════════════════════════════════════════════════════════
   * STATE
   * ═══════════════════════════════════════════════════════════════════ */
  var snake   = [];    // array of {x,y}, head-first
  var dir     = { x: 1, y: 0 };   // current direction
  var nextDir = { x: 1, y: 0 };   // queued direction (prevent 180°)
  var food    = { x: 0, y: 0 };
  var score   = 0;
  var best    = 0;
  var alive   = false;
  var running = false;
  var rafId   = null;
  var lastTick= 0;

  /* Speed: starts at 150ms/tick, decreases by 8ms every 5 points, min 70ms */
  function tickInterval() {
    return Math.max(70, 150 - Math.floor(score / 5) * 8);
  }

  /* ═══════════════════════════════════════════════════════════════════
   * FOOD PLACEMENT — never on snake body
   * ═══════════════════════════════════════════════════════════════════ */
  function placeFood() {
    var candidates = [];
    for (var y = 0; y < ROWS; y++) {
      for (var x = 0; x < COLS; x++) {
        var onSnake = snake.some(function(s) { return s.x === x && s.y === y; });
        if (!onSnake) candidates.push({ x: x, y: y });
      }
    }
    if (!candidates.length) return;
    food = candidates[Math.floor(Math.random() * candidates.length)];
  }

  /* ═══════════════════════════════════════════════════════════════════
   * UPDATE — called once per tick
   * ═══════════════════════════════════════════════════════════════════ */
  function update() {
    dir = { x: nextDir.x, y: nextDir.y };

    var head = snake[0];
    var next = { x: head.x + dir.x, y: head.y + dir.y };

    /* ── Bounding-box collision ─────────────────────────────────── */
    if (next.x < 0 || next.x >= COLS || next.y < 0 || next.y >= ROWS) {
      killSnake(); return;
    }

    /* ── Self-collision (ignore last segment — it moves away) ───── */
    for (var i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === next.x && snake[i].y === next.y) {
        killSnake(); return;
      }
    }

    /* ── Move: prepend new head ─────────────────────────────────── */
    snake.unshift(next);

    /* ── Eat food ───────────────────────────────────────────────── */
    if (next.x === food.x && next.y === food.y) {
      score++;
      if (score > best) {
        best = score;
        NDLGameState.saveScore('snake', best);
      }
      document.getElementById('disp-score').textContent = score;
      document.getElementById('disp-best').textContent  = best;
      placeFood();
      /* Don't remove tail — snake grows */
    } else {
      snake.pop(); // remove tail
    }
  }

  function killSnake() {
    alive   = false;
    running = false;
    render();
    showOverlay(
      'Game Over',
      'Score: ' + score + ' · Best: ' + best,
      '#ef4444',
      'Play Again'
    );
  }

  /* ═══════════════════════════════════════════════════════════════════
   * RENDER — requestAnimationFrame loop (draws every frame)
   * ═══════════════════════════════════════════════════════════════════ */
  function loop(timestamp) {
    if (!running) return;

    if (timestamp - lastTick >= tickInterval()) {
      lastTick = timestamp;
      update();
      if (!alive) return;
    }

    render();
    rafId = requestAnimationFrame(loop);
  }

  function render() {
    var W = canvas.width, H = canvas.height;

    /* Background */
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    /* Subtle grid lines */
    ctx.strokeStyle = '#f1f5f9';
    ctx.lineWidth = 0.5;
    for (var x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke();
    }
    for (var y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke();
    }

    /* Food — emerald with inner glow */
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
    ctx.fillStyle = '#86efac';
    ctx.fillRect(food.x * CELL + 5, food.y * CELL + 5, CELL - 10, CELL - 10);

    /* Snake body */
    for (var i = snake.length - 1; i >= 0; i--) {
      var seg = snake[i];
      var isHead = (i === 0);
      var t = 1 - (i / snake.length) * 0.35; // slight gradient dark→lighter toward tail
      ctx.fillStyle = isHead ? '#0f172a' : ('rgba(' + Math.round(30 + (1-t)*60) + ',' + Math.round(41 + (1-t)*60) + ',' + Math.round(59 + (1-t)*60) + ',1)');
      var pad = isHead ? 1 : 2;
      ctx.fillRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2);

      /* Eyes on head */
      if (isHead) {
        ctx.fillStyle = '#fff';
        var ex = seg.x * CELL, ey = seg.y * CELL;
        if (dir.x === 1)  { ctx.fillRect(ex+CELL-5, ey+3,  3, 3); ctx.fillRect(ex+CELL-5, ey+CELL-6, 3, 3); }
        if (dir.x === -1) { ctx.fillRect(ex+2,       ey+3,  3, 3); ctx.fillRect(ex+2,       ey+CELL-6, 3, 3); }
        if (dir.y === -1) { ctx.fillRect(ex+3,       ey+2,  3, 3); ctx.fillRect(ex+CELL-6, ey+2,      3, 3); }
        if (dir.y === 1)  { ctx.fillRect(ex+3,       ey+CELL-5, 3, 3); ctx.fillRect(ex+CELL-6, ey+CELL-5, 3, 3); }
      }
    }
  }

  /* ═══════════════════════════════════════════════════════════════════
   * OVERLAY HELPERS
   * ═══════════════════════════════════════════════════════════════════ */
  function showOverlay(title, sub, titleColor, btnText) {
    var ov = document.getElementById('canvas-overlay');
    document.getElementById('ov-title').textContent = title;
    document.getElementById('ov-title').style.color = titleColor || '#0f172a';
    document.getElementById('ov-sub').textContent   = sub;
    ov.querySelector('.btn-action').textContent      = btnText || 'Start Game';
    ov.classList.remove('hidden');
  }
  function hideOverlay() {
    document.getElementById('canvas-overlay').classList.add('hidden');
  }

  /* ═══════════════════════════════════════════════════════════════════
   * GAME FLOW
   * ═══════════════════════════════════════════════════════════════════ */
  function startGame() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

    var startX = Math.floor(COLS / 2);
    var startY = Math.floor(ROWS / 2);
    snake   = [{ x: startX, y: startY }, { x: startX-1, y: startY }, { x: startX-2, y: startY }];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    alive   = true;
    running = true;
    lastTick= 0;

    document.getElementById('disp-score').textContent = 0;
    document.getElementById('disp-best').textContent  = best;

    placeFood();
    hideOverlay();

    rafId = requestAnimationFrame(loop);
  }

  /* ═══════════════════════════════════════════════════════════════════
   * INPUT
   * ═══════════════════════════════════════════════════════════════════ */
  var DIR_MAP = {
    ArrowUp:    { x:  0, y: -1 }, w: { x:  0, y: -1 }, W: { x:  0, y: -1 },
    ArrowDown:  { x:  0, y:  1 }, s: { x:  0, y:  1 }, S: { x:  0, y:  1 },
    ArrowLeft:  { x: -1, y:  0 }, a: { x: -1, y:  0 }, A: { x: -1, y:  0 },
    ArrowRight: { x:  1, y:  0 }, d: { x:  1, y:  0 }, D: { x:  1, y:  0 },
  };

  function applyDir(d) {
    if (!alive || !running) return;
    /* Prevent 180° reversal */
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
  }

  document.addEventListener('keydown', function(e) {
    if (DIR_MAP[e.key]) {
      e.preventDefault();
      applyDir(DIR_MAP[e.key]);
    }
  });

  /* D-pad buttons */
  function dpadPress(direction) {
    var map = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };
    applyDir(map[direction]);
  }

  /* Touch swipe on canvas */
  var tx0, ty0;
  canvas.addEventListener('touchstart', function(e) {
    tx0 = e.touches[0].clientX;
    ty0 = e.touches[0].clientY;
  }, { passive: true });
  canvas.addEventListener('touchend', function(e) {
    if (tx0 == null) return;
    var dx = e.changedTouches[0].clientX - tx0;
    var dy = e.changedTouches[0].clientY - ty0;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      applyDir(dx > 0 ? { x:1, y:0 } : { x:-1, y:0 });
    } else {
      applyDir(dy > 0 ? { x:0, y:1 } : { x:0, y:-1 });
    }
    tx0 = ty0 = null;
  }, { passive: true });

  /* ═══════════════════════════════════════════════════════════════════
   * INIT
   * ═══════════════════════════════════════════════════════════════════ */
  document.addEventListener('DOMContentLoaded', function() {
    NDLGameState.requireUsername(function() {
      best = NDLGameState.getHighScore('snake');
      document.getElementById('disp-best').textContent = best;
      /* Draw initial idle state */
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    });
  });
  </script>
</body>
</html>
